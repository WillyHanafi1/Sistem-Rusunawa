name: CI/CD Pipeline to DigitalOcean

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ] # Jalankan tes saat ada Pull Request

jobs:
  # TAHAP 1: Continuous Integration (CI)
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'rusun-frontend/package.json'

      - name: Install Frontend Dependencies
        working-directory: ./rusun-frontend
        run: npm ci

      - name: Run Next.js Build Check (Validation)
        working-directory: ./rusun-frontend
        run: npm run build

      - name: Setup Python (Backend)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Dependencies
        working-directory: ./rusun-backend
        run: pip install -r requirements.txt

      # Jika ada unit test, nyalakan bagian ini:
      # - name: Run Pytest
      #   working-directory: ./rusun-backend
      #   run: pytest

  # TAHAP 2: Continuous Deployment (CD)
  # Hanya jalan JIKA tahap "test-and-lint" SUKSES
  deploy:
    needs: test-and-lint 
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /opt/rusunawa
            
            # Reset changes and pull latest
            git fetch origin master
            git reset --hard origin/master
            
            # 1. Load variables and Ensure DB is up
            if [ -f .env ]; then
              export $(grep -v '^#' .env | xargs)
            fi
            
            echo "--- Tahap 1: Persiapan Database ---"
            docker compose -f docker-compose.prod.yml up -d db
            mkdir -p backups
            
            echo "--- Membuat Backup Database ---"
            # Pastikan pg_dump tidak macet menunggu password
            docker exec -e PGPASSWORD="$POSTGRES_PASSWORD" rusunawa_db pg_dump -U "${POSTGRES_USER:-rusun_user}" "${POSTGRES_DB:-rusunawa}" | gzip > backups/backup_$(date +%Y%m%d_%H%M%S).sql.gz
            # Keep only last 5 backups
            ls -dt backups/* 2>/dev/null | tail -n +6 | xargs -r rm -f
            
            # 2. Build and migrate
            echo "--- Tahap 2: Rebuild & Migrasi ---"
            docker compose -f docker-compose.prod.yml build
            
            # Tutup koneksi aktif agar tidak ada lock saat migrasi (perbaikan masalah loading terus)
            echo "--- Menutup Koneksi Database Aktif (Pembersihan Lock) ---"
            docker exec rusunawa_db psql -U "${POSTGRES_USER:-rusun_user}" -d "${POSTGRES_DB:-rusunawa}" -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = '${POSTGRES_DB:-rusunawa}' AND pid <> pg_backend_pid();" || true
            
            echo "--- Menjalankan Alembic Upgrade ---"
            docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head
            
            # 3. Deploy
            echo "--- Tahap 3: Peluncuran Kontainer Baru ---"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "--- DEPLOY BERHASIL ---"
