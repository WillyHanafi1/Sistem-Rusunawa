services:
  db:
    image: postgres:15-alpine
    container_name: rusunawa_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rusun_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rusunawa}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rusun_user} -d ${POSTGRES_DB:-rusunawa}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rusunawa_net

  backend:
    build:
      context: ./rusun-backend
      dockerfile: Dockerfile.prod
    container_name: rusunawa_backend
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rusun_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rusunawa}
    ports:
      - "8100:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - rusunawa_net

  frontend:
    build:
      context: ./rusun-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: rusunawa_frontend
    restart: always
    ports:
      - "3010:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - API_INTERNAL_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - rusunawa_net

volumes:
  pgdata:
  uploads_data:

networks:
  rusunawa_net:
    driver: bridge
